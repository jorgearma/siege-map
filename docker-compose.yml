services:
  backend:
    build: ./backend
    container_name: ssh-rain-backend
    restart: unless-stopped
    env_file: .env
    volumes:
      # Mount the host SSH log file (read-only)
      - ${SSH_LOG_PATH:-/var/log/auth.log}:${SSH_LOG_PATH:-/var/log/auth.log}:ro
      # Mount the nginx log directory (so tail -F survives logrotate)
      - /var/log/nginx:/var/log/nginx:ro
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    container_name: ssh-rain-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
